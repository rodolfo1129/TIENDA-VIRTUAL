<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente | Arktech Store</title>
    <link rel="stylesheet" href="styles.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar" style="height: 80px;">
        <div class="logo" onclick="location.href='index.html'">Arktech<span>Store</span></div>
        <div class="menu">
            <a href="index.html">Volver a la Tienda</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 50px;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 25px; color: var(--main);">Registro de Cliente</h2>
            <form id="form-cliente">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Nombre Completo</label>
                    <input type="text" id="cliente-nombre" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-id-card"></i> Identificación (Cédula/NIT)</label>
                    <input type="text" id="cliente-id" placeholder="Número de documento" required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-phone"></i> Teléfono</label>
                        <input type="tel" id="cliente-tel" placeholder="300 000 0000" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                        <input type="email" id="cliente-email" placeholder="correo@ejemplo.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-map-marker-alt"></i> Dirección de Entrega</label>
                    <input type="text" id="cliente-dir" placeholder="Calle, Carrera, Barrio y Ciudad" required>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-comment-dots"></i> Notas Adicionales (Opcional)</label>
                    <textarea id="cliente-notas" rows="3" placeholder="Indicaciones para el repartidor..."></textarea>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 20px;">
                    CONFIRMAR DATOS Y PAGAR <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="text/javascript" src="https://checkout.epayco.co/checkout.js"></script>

<script>
    // Dentro del <script> de clientes.html, al puro principio:
const totalCompra = localStorage.getItem('total_compra');

if (!totalCompra || totalCompra == 0) {
    alert("No detectamos un total de compra. Regresando a la tienda...");
    window.location.href = 'index.html';
} else {
    console.log("Total cargado para pagar: $" + totalCompra);
}
// 1. Configuración de ePayco
const handler = ePayco.checkout.configure({
    key: 'bdb149b838ad1858a72a78d226081ace53cde4f5', 
    test: true
});

document.getElementById('form-cliente').onsubmit = async function(e) {
    e.preventDefault();

    // 2. RECUPERAMOS EL TOTAL REAL (Lo que guardamos en localStorage en index.html)
    // Si por alguna razón no existe, usamos 0 para evitar que el código se rompa.
    const totalCompra = localStorage.getItem('total_compra') || 0;

    // 3. VALIDACIÓN: Si el total es 0, no dejamos seguir.
    if (parseFloat(totalCompra) <= 0) {
        alert("Error: Tu carrito está vacío o el total es $0. Vuelve a la tienda.");
        window.location.href = 'index.html';
        return;
    }

    try {
        // 4. PREPARAMOS LOS DATOS PARA NUESTRA BASE DE DATOS (MySQL)
        const ventaData = {
            nombre: document.getElementById('cliente-nombre').value,
            email: document.getElementById('cliente-email').value,
            telefono: document.getElementById('cliente-tel').value,
            direccion: document.getElementById('cliente-dir').value,
            documento: document.getElementById('cliente-id').value,
            total: totalCompra
        };

        // 5. GUARDAMOS EN MYSQL (Aseguramos la venta en el servidor)
        const response = await fetch('http://localhost:3000/api/ventas/nueva', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ventaData)
        });

        const result = await response.json();

        if (result.success) {
            // 6. LANZAMOS EPAYCO (Solo si MySQL ya guardó los datos)
            const data = {
                name: "Compra Arktech Store",
                description: "Orden #" + result.id_venta,
                currency: "cop",
                amount: totalCompra.toString(),
                tax_base: "0",
                tax: "0",
                country: "co",
                lang: "es",
                external: "false",
                
                // Datos del cliente para la pasarela
                name_billing: ventaData.nombre,
                address_billing: ventaData.direccion,
                email_billing: ventaData.email,
                mobile_phone_billing: ventaData.telefono,
                number_doc_billing: ventaData.documento,
                
                // A dónde volver después del pago
                response: window.location.href
            };

            handler.open(data);
        } else {
            alert("Error al registrar la venta en el servidor.");
        }

    } catch (error) {
        console.error("Error en el proceso:", error);
        alert("El servidor no responde. Asegúrate de que 'node server.js' esté corriendo.");
    }
};
</script>
</body>
</html>
